<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Нитка — соцсеть</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dark">
  <div id="app">
    <header>
      <h1>⚡ Нитка</h1>
      <div id="authArea"></div>
      <span id="themeToggle" onclick="toggleTheme()" style="cursor:pointer; font-size:1.4rem;">🌓</span>
      <div id="notifArea">
        <span id="notifBell" onclick="toggleNotifPanel()">🔔<span id="notifCount" class="badge" style="display:none;">0</span></span>
        <div id="notifPanel" class="dropdown"></div>
      </div>
    </header>
    <main id="content"></main>
    <nav id="bottomNav">
      <button class="nav-btn" data-tab="feed">🔥<span>Лента</span></button>
      <button class="nav-btn" data-tab="explore">🌍<span>Обзор</span></button>
      <button class="nav-btn" data-tab="create">➕<span>Пост</span></button>
      <button class="nav-btn" data-tab="messages">💬<span>Чаты</span></button>
      <button class="nav-btn" data-tab="clubs">🧶<span>Клубки</span></button>
    </nav>
  </div>

  <div id="profileModal" class="modal" style="display:none;">
    <div class="modal-content">
      <span class="close" onclick="closeProfileModal()">&times;</span>
      <h2>Войти или создать профиль</h2>
      <div id="profileList"></div>
      <hr>
      <input type="text" id="newName" placeholder="Ваше имя">
      <label>Аватар (необязательно)</label>
      <input type="file" id="avatarInput" accept="image/*">
      <button onclick="createProfile()" class="primary">Создать</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
